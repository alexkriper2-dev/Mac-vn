name: macOS AnyDesk Auto-Accept
on: workflow_dispatch

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Install AnyDesk
        run: |
          curl -L -o AnyDesk.dmg https://download.anydesk.com/anydesk.dmg
          sudo hdiutil mount AnyDesk.dmg
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          hdiutil unmount /Volumes/AnyDesk

      - name: Configure Auto-Accept
        run: |
          # Запускаем приложение
          open /Applications/AnyDesk.app
          sleep 15
          
          # Разрешаем интерактивные подключения (чтобы появилось окно "Принять")
          # И на всякий случай всё равно ставим простой пароль для фонового входа
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password "123456"
          
          # Даем права на выполнение сервиса
          chmod +x /Applications/AnyDesk.app/Contents/MacOS/AnyDesk

      - name: Get ID and Stay Alive
        run: |
          # Цикл для получения ID, если он не появился сразу
          for i in {1..6}; do
            ANYDESK_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
            if [ ! -z "$ANYDESK_ID" ]; then break; fi
            echo "Генерация ID... попытка $i"
            sleep 10
          done

          echo "------------------------------------------------"
          echo "ID ДЛЯ ПОДКЛЮЧЕНИЯ: $ANYDESK_ID"
          echo "ПАРОЛЬ (если спросит): 123456"
          echo "Или просто нажмите 'Принять' в окне на стороне GitHub"
          echo "------------------------------------------------"
          
          # Держим сессию активной
          sleep 21600
          
