name: AnyDesk macOS Connection
on: workflow_dispatch

jobs:
  connect:
    runs-on: macos-latest
    steps:
      - name: Install AnyDesk
        run: brew install --cask anydesk

      - name: Configure and Start AnyDesk
        run: |
          # 1. Запускаем фоновую службу
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service &
          sleep 10
          
          # 2. Устанавливаем пароль (замени MyPassword123 на свой или используй Secret)
          # Важно: используем sudo, так как конфиг AnyDesk защищен
          echo "1234" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password
          
          # 3. Даем права на запуск (иногда требуется на macOS раннерах)
          sudo chmod +x /Applications/AnyDesk.app/Contents/MacOS/AnyDesk
          
      - name: Display Connection ID
        run: |
          # Получаем ID для подключения
          echo "--------------------------------"
          echo "ID ДЛЯ ПОДКЛЮЧЕНИЯ:"
          /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id
          echo "ПАРОЛЬ: 1234"
          echo "--------------------------------"

      - name: Keep Alive
        run: |
          # Чтобы воркфлоу не закрылся сразу, держим его активным
          # 21600 секунд = 6 часов
          sleep 21600
          
