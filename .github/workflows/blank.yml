name: Remote macOS (Final Fix)
on: workflow_dispatch

jobs:
  connect:
    runs-on: macos-latest
    steps:
      - name: 1. Install Tools
        run: brew install ngrok --cask

      - name: 2. Force Set Password and VNC
        run: |
          # Используем sysadminctl — он лучше работает в автоматизации
          # Устанавливаем пароль '1234' для текущего пользователя runner
          sudo sysadminctl -adminUser runner -adminPassword "" -password "1234" || true
          
          # Если верхняя команда не сработала, пробуем через apple script (эмуляция ввода)
          sudo passwd runner <<EOF
          1234
          1234
          EOF
          
          # Включаем удаленный доступ
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true

      - name: 3. Start Tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ngrok tcp 5900 --log=stdout > ngrok.log &
          sleep 10

      - name: 4. Reveal Connection Details
        run: |
          ADDRESS=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "=========================================="
          echo "АДРЕС: $ADDRESS"
          echo "USER: runner"
          echo "PASS: 1234"
          echo "=========================================="
          
          if [ "$ADDRESS" == "null" ]; then
            echo "Ngrok error! Check your token."
            cat ngrok.log
            exit 1
          fi

      - name: 5. Keep Alive
        run: sleep 21600
        
