name: Fast macOS VNC
on: workflow_dispatch

jobs:
  remote:
    runs-on: macos-latest
    steps:
      - name: Install Ngrok
        run: brew install ngrok --cask

      - name: Start VNC and Password
        run: |
          # Устанавливаем пароль '1234'
          sudo dscl . -passwd /Users/runner 1234 || echo "1234" | sudo passwd runner
          
          # Включаем удаленный доступ (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true

      - name: Launch Tunnel
        run: |
          # Авторизация и запуск одним махом
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          ngrok tcp 5900 --log=stdout > ngrok.log &
          sleep 10

      - name: Get Address
        run: |
          # Выводим адрес для входа
          curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          
      - name: Keep Session
        run: sleep 21600
        
