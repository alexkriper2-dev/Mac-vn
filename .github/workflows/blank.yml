name: macOS TeamViewer Remote
on: workflow_dispatch

jobs:
  connect:
    runs-on: macos-latest
    steps:
      - name: Install TeamViewer
        run: |
          brew install --cask teamviewer
          
      - name: Setup and Start TeamViewer
        run: |
          # 1. Запускаем фоновую службу (демон)
          sudo /Applications/TeamViewer.app/Contents/MacOS/TeamViewer --daemon start
          
          # 2. Устанавливаем пароль для неконтролируемого доступа
          # Замени 'YourPass123' на свой сложный пароль
          sudo /Applications/TeamViewer.app/Contents/MacOS/TeamViewer --passwd YourPass123
          
          # 3. Даем время на генерацию ID
          sleep 15

      - name: Get TeamViewer ID
        run: |
          # Команда для получения ID в консоль
          echo "--------------------------------"
          echo "TEAMVIEWER ID:"
          /Applications/TeamViewer.app/Contents/MacOS/TeamViewer --info | grep "TeamViewer ID"
          echo "PASSWORD: YourPass123"
          echo "--------------------------------"

      - name: Keep Alive
        run: |
          # Воркфлоу будет работать до 6 часов
          sleep 21600
          
