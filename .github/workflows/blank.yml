name: macOS Remote Control (Native VNC)
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Setup Password and Native VNC
        run: |
          # Устанавливаем пароль '123456' для пользователя 'runner'
          sudo sysadminctl -adminUser runner -adminPassword "" -password 123456
          
          # Включаем встроенный Screen Sharing (Native VNC)
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # Настраиваем права доступа через kickstart
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd 123456 \
            -privs -all -restart -agent -menu

      - name: 2. Start Tmate & Connect
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
