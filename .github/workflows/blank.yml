name: macOS Direct Link (Tailscale)
on: workflow_dispatch

jobs:
  connect:
    runs-on: macos-latest
    steps:
      - name: 1. Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: 2. Connect Tailscale
        env:
          # Твой ключ из панели Tailscale
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: sudo tailscale up --authkey=$TS_KEY

      - name: 3. Enable VNC & Password
        run: |
          sudo dscl . -passwd /Users/runner 1234 || echo "1234" | sudo passwd runner
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true

      - name: 4. Reveal IP Address
        run: |
          echo "=========================================="
          echo "ТВОЙ ПЕРСОНАЛЬНЫЙ IP ДЛЯ VNC:"
          tailscale ip -4
          echo "=========================================="

      - name: 5. Keep Alive
        run: sleep 21600
        
