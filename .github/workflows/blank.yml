name: macOS VNC Debug
on: workflow_dispatch

jobs:
  connect:
    runs-on: macos-latest
    steps:
      - name: 1. Install Tools
        run: |
          brew install ngrok --cask
          sudo DevToolsSecurity -enable

      - name: 2. Set Password & Enable VNC
        run: |
          # Пытаемся установить пароль '1234' разными способами
          sudo sysadminctl -adminUser runner -adminPassword "" -password "1234" || true
          echo "1234" | sudo passwd runner || true
          
          # Включаем VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true

      - name: 3. Start Ngrok with Debug
        env:
          TKN: ${{ secrets.NGROK_TOKEN }}
        run: |
          # Если токен пустой, скрипт об этом скажет
          if [ -z "$TKN" ]; then echo "ОШИБКА: Секрет NGROK_TOKEN не найден в настройках!"; exit 1; fi
          
          # Авторизация
          ngrok config add-authtoken "$TKN"
          
          # Запуск туннеля (логируем всё в файл ngrok.log)
          ngrok tcp 5900 --log=stdout > ngrok.log &
          
          # Даем время на запуск
          sleep 15

      - name: 4. Reveal Address or Show Error
        run: |
          # Пытаемся достать адрес через локальный API ngrok
          ADDRESS=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          if [ "$ADDRESS" == "null" ] || [ -z "$ADDRESS" ]; then
            echo "------------------------------------------"
            echo "КРИТИЧЕСКАЯ ОШИБКА: NGROK НЕ ЗАПУСТИЛСЯ"
            echo "Вот лог ошибки:"
            cat ngrok.log
            echo "------------------------------------------"
            exit 1
          else
            echo "=========================================="
            echo "ПОДКЛЮЧАЙСЯ: $ADDRESS"
            echo "USER: runner"
            echo "PASS: 1234"
            echo "=========================================="
          fi

      - name: 5. Keep Alive
        run: sleep 21600
        
