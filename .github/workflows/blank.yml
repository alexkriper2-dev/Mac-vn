name: macOS AnyDesk Connect
on: workflow_dispatch

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Install AnyDesk
        run: |
          curl -L -o AnyDesk.dmg https://download.anydesk.com/anydesk.dmg
          sudo hdiutil mount AnyDesk.dmg
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          hdiutil unmount /Volumes/AnyDesk

      - name: Force Init Configs
        run: |
          # Создаем папки настроек вручную, чтобы избежать ошибки 64
          sudo mkdir -p /etc/anydesk
          sudo mkdir -p ~/.anydesk
          
          # Даем полные права приложению
          sudo chmod +x /Applications/AnyDesk.app/Contents/MacOS/AnyDesk
          
          # Запускаем и даем 20 секунд на "прогрев"
          open /Applications/AnyDesk.app
          sleep 20

      - name: Setup Password and ID
        run: |
          # Устанавливаем пароль (используем "123456" для простоты)
          # Если 64 ошибка все еще лезет, мы ее игнорируем через '|| true'
          echo "123456" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password || true
          
          # Пытаемся получить ID
          for i in {1..10}; do
            ANYDESK_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
            if [ ! -z "$ANYDESK_ID" ]; then break; fi
            echo "Ждем ID..."
            sleep 5
          done
          
          echo "------------------------------------------------"
          echo "ПОДКЛЮЧАЙСЯ ПО ID: $ANYDESK_ID"
          echo "ПАРОЛЬ: 123456"
          echo "------------------------------------------------"

      - name: Keep Session Open
        run: sleep 21600
        
