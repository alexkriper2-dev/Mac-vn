name: Ultimate macOS Remote
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install VNC Server
        run: brew install tiger-vnc

      - name: Configure VNC Desktop
        run: |
          # 1. Создаем папку для настроек
          mkdir -p ~/.vnc
          # 2. Устанавливаем пароль 'password123'
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # 3. Запускаем VNC на порту 5901 (экран :1)
          # Используем стандартное разрешение для стабильности
          vncserver :1 -geometry 1280x720 -depth 24

      - name: Start Tmate & Connect
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
          
