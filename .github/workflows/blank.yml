name: macOS Remote VNC via ngrok
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Install TigerVNC & ngrok
        run: |
          brew install tiger-vnc
          brew install --cask ngrok

      - name: 2. Setup VNC (Fix PATH & Password)
        run: |
          # Принудительно добавляем пути, чтобы не было ошибки "command not found"
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          
          mkdir -p ~/.vnc
          # Устанавливаем пароль (минимум 6 символов)
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Запускаем сервер на дисплее :1 (порт 5901)
          vncserver :1 -geometry 1280x720 -depth 24

      - name: 3. Start ngrok Tunnel
        run: |
          # Используем секрет NGROK_AUTH_TOKEN из настроек репозитория
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Пробрасываем TCP порт 5901
          ngrok tcp 5901 --log=stdout &
          sleep 10

      - name: 4. Get Connection Details
        run: |
          # Вытаскиваем публичный адрес
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "--------------------------------------------------"
          echo "СКОПИРУЙ ЭТОТ АДРЕС:"
          echo "$URL" | sed 's/tcp:\/\///'
          echo "ПАРОЛЬ: password123"
          echo "--------------------------------------------------"

      - name: 5. Keep Alive
        run: sleep 21600 # 6 часов работы
        
