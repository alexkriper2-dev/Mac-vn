name: macOS VNC NO PASSWORD
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Install TigerVNC & ngrok
        run: |
          brew install tiger-vnc
          brew install --cask ngrok

      - name: 2. Start VNC Server (No Security)
        run: |
          # Добавляем пути Homebrew
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          
          # Запускаем VNC с отключенной проверкой пароля (-SecurityTypes None)
          # Это решает проблему с отсутствующей командой vncpasswd
          vncserver :1 -geometry 1280x720 -depth 24 -SecurityTypes None

      - name: 3. Start ngrok Tunnel
        run: |
          # Используй свой секрет NGROK_AUTH_TOKEN
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Пробрасываем порт 5901 (VNC)
          ngrok tcp 5901 --log=stdout &
          sleep 10

      - name: 4. Get Connection Details
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "--------------------------------------------------"
          echo "АДРЕС ДЛЯ ПОДКЛЮЧЕНИЯ (ПАРОЛЬ НЕ НУЖЕН):"
          echo "$URL" | sed 's/tcp:\/\///'
          echo "--------------------------------------------------"

      - name: 5. Keep Alive
        run: sleep 21600
        
