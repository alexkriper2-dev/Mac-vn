name: Ultimate macOS Control
on: workflow_dispatch

jobs:
  remote:
    runs-on: macos-latest
    steps:
      - name: 1. Start Native Apple VNC
        run: |
          # Включаем встроенный Screen Sharing и ставим пароль '123456'
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpw -vncpw 123456 \
          -restart -agent -privs -all
          
          # Открываем Finder, чтобы GUI "проснулся"
          open /System/Library/CoreServices/Finder.app

      - name: 2. Connect via Tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
          
