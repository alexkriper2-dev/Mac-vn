name: macOS Remote Desktop
on: workflow_dispatch # Запуск вручную

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install AnyDesk
        run: |
          brew install --cask anydesk

      - name: Set AnyDesk Password
        run: |
          # Установка пароля для неконтролируемого доступа
          # Замените 'YourStrongPassword123' на свой секретный пароль
          echo "YourStrongPassword123" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password
          
      - name: Get AnyDesk ID
        run: |
          # Ожидание инициализации и вывод ID в консоль
          sleep 5
          AD_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
          echo "--------------------------------"
          echo "AnyDesk ID: $AD_ID"
          echo "--------------------------------"

      - name: Keep Alive
        run: |
          # Воркфлоу будет работать до 6 часов (лимит GitHub)
          # Чтобы завершить сессию, просто остановите Run в GitHub Actions
          sleep 21600 
          
