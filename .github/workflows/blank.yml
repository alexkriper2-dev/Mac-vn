name: macOS VNC Reveal
on: workflow_dispatch

jobs:
  vnc-job:
    runs-on: macos-latest
    steps:
      - name: 1. Install Cloudflared
        run: brew install cloudflared

      - name: 2. Set Password & Enable VNC
        run: |
          # Устанавливаем пароль '1234' для пользователя runner
          sudo dscl . -passwd /Users/runner 1234 || echo "1234" | sudo passwd runner
          # Включаем встроенный VNC-сервер macOS
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true

      - name: 3. Start Tunnel
        run: |
          # Запускаем туннель Cloudflare на порт VNC (5900)
          # Логируем в файл, чтобы достать ссылку
          cloudflared tunnel --url tcp://localhost:5900 > cf.log 2>&1 &
          echo "Ожидание генерации ссылки..."
          sleep 15

      - name: 4. REVEAL CONNECTION ADDRESS
        run: |
          # Извлекаем адрес .trycloudflare.com
          VNC_ADDR=$(grep -o 'https://[-a-z0-9.]*trycloudflare.com' cf.log | head -n 1)
          
          echo " "
          echo "############################################################"
          echo "##                                                        ##"
          echo "##          АДРЕС ДЛЯ ПОДКЛЮЧЕНИЯ (VNC):                  ##"
          echo "##                                                        ##"
          echo "##    $VNC_ADDR    ##"
          echo "##                                                        ##"
          echo "##    USER: runner                                        ##"
          echo "##    PASS: 1234                                          ##"
          echo "##                                                        ##"
          echo "############################################################"
          echo " "
          
          if [ -z "$VNC_ADDR" ]; then
            echo "ОШИБКА: Ссылка не создалась. Посмотри полный лог:"
            cat cf.log
            exit 1
          fi

      - name: 5. Stay Online
        run: sleep 21600
        
