name: macOS AnyDesk Remote
on: workflow_dispatch

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Download and Install AnyDesk
        run: |
          # 1. Скачиваем DMG
          curl -L -o AnyDesk.dmg https://download.anydesk.com/anydesk.dmg
          
          # 2. Монтируем образ
          sudo hdiutil mount AnyDesk.dmg
          
          # 3. Копируем приложение (используем дикую маскировку, так как имя может меняться)
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          
          # 4. Размонтируем
          hdiutil unmount /Volumes/AnyDesk
          
      - name: Configure AnyDesk and Password
        run: |
          # Устанавливаем пароль для доступа (замените 'TargetPassword123')
          # Используем прямой путь к бинарному файлу внутри пакета
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password "TargetPassword123"
          
          # Запускаем AnyDesk в фоновом режиме
          open /Applications/AnyDesk.app
          
      - name: Get AnyDesk ID
        run: |
          echo "Ожидаем генерацию ID..."
          sleep 10
          # Получаем ID устройства
          ANYDESK_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
          echo "----------------------------------------"
          echo "ANYDESK ID: $ANYDESK_ID"
          echo "PASSWORD: TargetPassword123"
          echo "----------------------------------------"

      - name: Keep Alive (6 hours)
        run: |
          # Не даем воркфлоу завершиться
          sleep 21600
          
          
