name: macOS Screen via Cloudflare
on: workflow_dispatch

jobs:
  remote:
    runs-on: macos-latest
    steps:
      - name: Install Cloudflared
        run: brew install cloudflared

      - name: Enable VNC and Set Password
        run: |
          # Устанавливаем пароль 1234
          sudo dscl . -passwd /Users/runner 1234 || echo "1234" | sudo passwd runner
          # Включаем общий доступ к экрану
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true

      - name: Start Cloudflare Tunnel
        run: |
          # Запускаем туннель на порт VNC (5900)
          # Он выдаст временную ссылку .trycloudflare.com
          cloudflared tunnel --url tcp://localhost:5900 > cloudflare.log 2>&1 &
          sleep 10

      - name: Get Public Address
        run: |
          # Вытаскиваем адрес из логов
          grep -o 'https://[-a-z0-9.]*trycloudflare.com' cloudflare.log || echo "Адрес генерируется, подожди..."
          echo "Если ссылки нет выше, посмотри полный лог:"
          cat cloudflare.log

      - name: Keep Alive
        run: sleep 21600
        
