name: macOS Remote Control
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Install VNC Server
        run: brew install tiger-vnc

      - name: 2. Configure VNC (No Password)
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          mkdir -p ~/.vnc
          # Устанавливаем пароль 123456
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Запускаем сервер на дисплее :1
          vncserver :1 -geometry 1280x720 -depth 24
          
          # Принудительно запускаем браузер, чтобы инициализировать GUI
          open -a Safari

      - name: 3. Start Tmate & Connect
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
          
