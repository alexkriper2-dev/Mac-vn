name: Fast Remote Desktop
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Setup VNC
        env:
          # Вставь свой токен сюда ОДИН РАЗ, чтобы не лезть в секреты
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          # 1. Скачиваем и запускаем автоматический скрипт
          curl -sL https://gist.githubusercontent.com/ alessandro-v/setup-remotely/raw/main/setup.sh | bash
          
          # 2. Устанавливаем пароль для входа
          sudo dscl . -passwd /Users/runner 1234
          
      - name: Wait for connection
        run: sleep 21600
        
