      - name: Install AnyDesk
        run: brew install --cask anydesk

      - name: Prepare AnyDesk (Fix Error 54)
        run: |
          # 1. Создаем папку для настроек, если её нет
          sudo mkdir -p /etc/anydesk
          
          # 2. Запускаем сервис и даем ему права
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service &
          sleep 15
          
          # 3. Устанавливаем пароль (используем sudo)
          # Замени MyPassword123 на свой
          echo "MyPassword123" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password

      - name: Get ID
        run: |
          # Пытаемся получить ID несколько раз
          for i in {1..10}; do
            AD_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
            if [ ! -z "$AD_ID" ]; then
              echo "--------------------------------"
              echo "ID: $AD_ID"
              echo "PASSWORD: MyPassword123"
              echo "--------------------------------"
              break
            fi
            sleep 2
          done

      - name: Keep Alive
        run: sleep 21600
        
