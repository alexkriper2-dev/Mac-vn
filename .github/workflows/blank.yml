name: macOS VNC via ngrok
on: workflow_dispatch

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Install VNC and ngrok
        run: |
          brew install tiger-vnc
          brew install --cask ngrok

      - name: Configure VNC
        run: |
          mkdir -p ~/.vnc
          # Устанавливаем пароль (минимум 6 символов)
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Start VNC Server
        run: |
          # Запускаем на порту 5901 (экран :1)
          vncserver :1 -geometry 1280x720 -depth 24

      - name: Start ngrok Tunnel
        run: |
          # Вставь свой токен в секреты репозитория как NGROK_AUTH_TOKEN
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Пробрасываем TCP порт 5901 (VNC)
          ngrok tcp 5901 --log=stdout &
          sleep 10

      - name: Get Connection Address
        run: |
          # Вытаскиваем адрес туннеля из API ngrok
          export ADDRESS=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "--------------------------------------------------"
          echo "АДРЕС ДЛЯ ПОДКЛЮЧЕНИЯ:"
          echo "$ADDRESS"
          echo "ПАРОЛЬ: password123"
          echo "--------------------------------------------------"

      - name: Keep Alive
        run: sleep 21600
        
