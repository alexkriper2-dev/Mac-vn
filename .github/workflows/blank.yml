name: macOS Remote Control (Native VNC)
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Setup Native VNC
        run: |
          # Устанавливаем пароль для текущего пользователя (runner)
          # В GitHub Actions пароль пользователя 'runner' по умолчанию пустой или неизвестен
          sudo dscl . -passwd /Users/runner 123456
          
          # Активируем Screen Sharing (Native VNC)
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # Разрешаем доступ для всех пользователей (или конкретно для runner)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -privs -all -restart -agent

      - name: 2. Start Tmate & Connect
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
