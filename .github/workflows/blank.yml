name: Native macOS VNC + ngrok
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Enable Built-in macOS VNC Server
        run: |
          # Включаем встроенный Screen Sharing (VNC) от Apple
          # Устанавливаем пароль '123456', так как Apple не пускает без него
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpw -vncpw 123456 \
          -restart -agent -privs -all
          
          echo "Native VNC Server started on port 5900"
          sleep 5

      - name: 2. Install & Start ngrok
        run: |
          brew install --cask ngrok
          
          # Используй свой секрет NGROK_AUTH_TOKEN
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Встроенный VNC Mac работает на порту 5900 (а не 5901)
          ngrok tcp 5900 --log=stdout &
          sleep 10

      - name: 3. Get Connection Details
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "--------------------------------------------------"
          echo "АДРЕС ДЛЯ ПОДКЛЮЧЕНИЯ:"
          echo "$URL" | sed 's/tcp:\/\///'
          echo "ПАРОЛЬ: 123456"
          echo "--------------------------------------------------"

      - name: 4. Keep Alive
        run: sleep 21600
        
