name: macOS AnyDesk Repair
on: workflow_dispatch

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Install AnyDesk
        run: |
          curl -L -o AnyDesk.dmg https://download.anydesk.com/anydesk.dmg
          sudo hdiutil mount AnyDesk.dmg
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          hdiutil unmount /Volumes/AnyDesk

      - name: Fix Permissions and Init
        run: |
          # Разрешаем запуск бинарника напрямую
          sudo chmod +x /Applications/AnyDesk.app/Contents/MacOS/AnyDesk
          
          # Запускаем фоновый сервис AnyDesk
          # Это критично, чтобы команда --set-password не выдавала 64
          open /Applications/AnyDesk.app
          sleep 20

      - name: Set Password (Fixing Error 64)
        run: |
          # Пробуем установить пароль через стандартную команду
          # Если упадет здесь — значит сервис не успел подняться
          sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password "YourPass123" || echo "Команда не прошла, пробуем альтернативу"
          
      - name: Get ID and Stay Alive
        run: |
          # Пытаемся достать ID несколько раз, если он не готов сразу
          for i in {1..5}; do
            ANYDESK_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
            if [ ! -z "$ANYDESK_ID" ]; then break; fi
            echo "Ожидание ID..."
            sleep 10
          done

          echo "----------------------------------------"
          echo "ANYDESK ID: $ANYDESK_ID"
          echo "PASSWORD: YourPass123"
          echo "----------------------------------------"
          
          # Держим воркфлоу активным
          sleep 21600
          
