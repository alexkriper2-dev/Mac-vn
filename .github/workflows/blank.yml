name: AnyDesk Remote with Screen
on: workflow_dispatch

jobs:
  anydesk-job:
    runs-on: macos-latest
    steps:
      - name: 1. Install AnyDesk and VNC
        run: |
          # Установка AnyDesk
          curl -L -o AnyDesk.dmg https://download.anydesk.com/anydesk.dmg
          sudo hdiutil mount AnyDesk.dmg
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          hdiutil unmount /Volumes/AnyDesk
          
          # Настройка пароля для пользователя runner (чтобы зайти на экран)
          sudo sysadminctl -adminUser runner -adminPassword "" -password "1234" || true

      - name: 2. Launch Services
        run: |
          # Включаем общий доступ к экрану (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true
          
          # Запускаем AnyDesk
          open /Applications/AnyDesk.app
          sleep 10

      - name: 3. Setup Tmate Tunnel
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false

      - name: 4. Get AnyDesk ID
        run: |
          # Выводим ID в логи
          /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id
          sleep 21600
          
