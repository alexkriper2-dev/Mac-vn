name: macOS Remote Screen (VNC)
on: workflow_dispatch

jobs:
  vnc-access:
    runs-on: macos-latest
    steps:
      - name: Setup Ngrok
        run: |
          brew install --cask ngrok
          # Замени ВАШ_ТОКЕН на токен из личного кабинета ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      - name: Enable Remote Desktop (VNC)
        run: |
          # Включаем службу "Общий экран" (Screen Sharing)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          
          # Устанавливаем пароль для пользователя runner (пароль будет: 1234)
          echo "1234" | sudo dscl . -passwd /Users/runner 1234
          
      - name: Create Tunnel
        run: |
          # Пробрасываем стандартный порт VNC (5900) через ngrok
          # Запускаем в фоновом режиме
          ngrok tcp 5900 --log=stdout & 
          sleep 10
          
          # Выводим адрес для подключения
          curl --silent http://127.0.0.1:4040/api/tunnels | jq '.tunnels[0].public_url'

      - name: Keep Alive
        run: sleep 21600
        
