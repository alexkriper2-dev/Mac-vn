name: macOS AnyDesk Fixed
on: workflow_dispatch

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Install AnyDesk
        run: |
          # Скачиваем и устанавливаем
          curl -L -o AnyDesk.dmg https://download.anydesk.com/anydesk.dmg
          sudo hdiutil mount AnyDesk.dmg
          # Используем cp -FP для сохранения ссылок и атрибутов
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          hdiutil unmount /Volumes/AnyDesk

      - name: Launch and Configure
        run: |
          # Даем системе права на выполнение бинарника
          sudo chmod +x /Applications/AnyDesk.app/Contents/MacOS/AnyDesk
          
          # Запускаем приложение в фоне, чтобы создались конфиги
          open /Applications/AnyDesk.app
          sleep 15
          
          # Устанавливаем пароль (теперь через стандартный ввод, если доступно)
          # Если 64 ошибка повторится здесь — попробуем без кавычек
          echo "TargetPassword123" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password
          
      - name: Connection Info
        run: |
          # Получаем ID
          ANYDESK_ID=$(/Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
          echo "----------------------------------------"
          echo "ID: $ANYDESK_ID"
          echo "PASS: TargetPassword123"
          echo "----------------------------------------"

      - name: Wait
        run: sleep 21600
        
