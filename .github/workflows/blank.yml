name: macOS for Android (No Card)
on: workflow_dispatch

jobs:
  connect:
    runs-on: macos-latest
    steps:
      - name: Install Localtunnel
        run: npm install -g localtunnel

      - name: Set Password & Enable VNC
        run: |
          # Пароль 1234
          sudo dscl . -passwd /Users/runner 1234 || echo "1234" | sudo passwd runner
          # Включаем экран
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers || true

      - name: Start Tunnel
        run: |
          # Пробрасываем порт 5900
          lt --port 5900 > lt.log 2>&1 &
          sleep 5

      - name: 🔍 ТВОЙ АДРЕС ТУТ
        run: |
          echo "############################################################"
          echo "##                                                        ##"
          echo "##  СКОПИРУЙ ЭТУ ССЫЛКУ И ВСТАВЬ В VNC VIEWER НА ТЕЛЕФОНЕ: ##"
          echo "##                                                        ##"
          echo "    $(grep -o 'https://.*' lt.log)                        "
          echo "##                                                        ##"
          echo "##  PASS: 1234                                            ##"
          echo "##  USER: runner                                          ##"
          echo "##                                                        ##"
          echo "############################################################"
          
